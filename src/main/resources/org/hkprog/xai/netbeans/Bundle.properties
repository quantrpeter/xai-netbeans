OpenIDE-Module-Name=xAI Assistant
OpenIDE-Module-Short-Description=GitHub Copilot-style coding assistant powered by the xAI (Grok) API.
OpenIDE-Module-Long-Description=Adds an AI coding assistant to NetBeans backed by the xAI API. \
Developers enter prompts and the assistant can ask questions about the code, plan changes, \
debug issues, and (in Agent mode) read, create and edit project files. Supports Ask, Agent, \
Plan, Debug and Multitask sessions. Configure your API key and model in Tools > Options > Miscellaneous > xAI Assistant.
OpenIDE-Module-Display-Category=AI Tools
